version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci --prefer-offline
        - npx prisma generate
    build:
      commands:
        - NODE_OPTIONS='--max-old-space-size=6144' npx next build
        - rm -rf .next/cache
        - rm -rf node_modules/@swc/core-linux-x64-gnu
        - rm -rf node_modules/@swc/core-linux-x64-musl
        - rm -rf node_modules/@esbuild/linux-x64
        - rm -rf node_modules/esbuild/linux-x64
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
