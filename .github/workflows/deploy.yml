name: Deploy to AWS App Runner
on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: itwhip-website

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create .env for Docker build
        run: |
          cat > .env.production <<'ENVFILE'
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_OPENWEATHER_API_KEY=${{ secrets.NEXT_PUBLIC_OPENWEATHER_API_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_URL_POOLED=${{ secrets.DATABASE_URL_POOLED }}
          DATABASE_URL_UNPOOLED=${{ secrets.DATABASE_URL_UNPOOLED }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          GUEST_JWT_SECRET=${{ secrets.GUEST_JWT_SECRET }}
          GUEST_JWT_REFRESH_SECRET=${{ secrets.GUEST_JWT_REFRESH_SECRET }}
          HOST_JWT_SECRET=${{ secrets.HOST_JWT_SECRET }}
          HOST_JWT_REFRESH_SECRET=${{ secrets.HOST_JWT_REFRESH_SECRET }}
          ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
          ADMIN_JWT_REFRESH_SECRET=${{ secrets.ADMIN_JWT_REFRESH_SECRET }}
          ADMIN_JWT_EXPIRES_IN=${{ secrets.ADMIN_JWT_EXPIRES_IN }}
          ADMIN_JWT_REFRESH_EXPIRES_IN=${{ secrets.ADMIN_JWT_REFRESH_EXPIRES_IN }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_IDENTITY_RESTRICTED_KEY=${{ secrets.STRIPE_IDENTITY_RESTRICTED_KEY }}
          STRIPE_IDENTITY_WEBHOOK_SECRET=${{ secrets.STRIPE_IDENTITY_WEBHOOK_SECRET }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_CONNECT_WEBHOOK_SECRET=${{ secrets.STRIPE_CONNECT_WEBHOOK_SECRET }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO=${{ secrets.EMAIL_REPLY_TO }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID=${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY=${{ secrets.APPLE_PRIVATE_KEY }}
          FIREBASE_ADMIN_PROJECT_ID=${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL=${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_API_KEY_SID=${{ secrets.TWILIO_API_KEY_SID }}
          TWILIO_API_KEY_SECRET=${{ secrets.TWILIO_API_KEY_SECRET }}
          TWILIO_TWIML_APP_SID=${{ secrets.TWILIO_TWIML_APP_SID }}
          FLEET_API_KEY=${{ secrets.FLEET_API_KEY }}
          FLEET_ADMIN_USERNAME=${{ secrets.FLEET_ADMIN_USERNAME }}
          FLEET_ADMIN_PASSWORD=${{ secrets.FLEET_ADMIN_PASSWORD }}
          FLEET_SESSION_SECRET=${{ secrets.FLEET_SESSION_SECRET }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          API_SECRET_KEY=${{ secrets.API_SECRET_KEY }}
          MASTER_ENCRYPTION_KEY=${{ secrets.MASTER_ENCRYPTION_KEY }}
          PHONE_VERIFICATION_CUTOFF=${{ secrets.PHONE_VERIFICATION_CUTOFF }}
          DEV_SERVER_URL=${{ secrets.DEV_SERVER_URL }}
          AMADEUS_API_KEY=${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET=${{ secrets.AMADEUS_API_SECRET }}
          AMADEUS_BASE_URL=${{ secrets.AMADEUS_BASE_URL }}
          AMADEUS_ENV=${{ secrets.AMADEUS_ENV }}
          AMADEUS_CACHE_TTL=${{ secrets.AMADEUS_CACHE_TTL }}
          AMADEUS_RATE_LIMIT=${{ secrets.AMADEUS_RATE_LIMIT }}
          AMADEUS_LOG_LEVEL=${{ secrets.AMADEUS_LOG_LEVEL }}
          AMADEUS_PROXY_ENABLED=${{ secrets.AMADEUS_PROXY_ENABLED }}
          UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ADMIN_API_KEY=${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          NEXT_PUBLIC_SITE_URL=https://itwhip.com
          ENVFILE
          sed -i 's/^[[:space:]]*//' .env.production

      - name: Fix multi-line PEM keys in .env.production
        env:
          APPLE_PK: ${{ secrets.APPLE_PRIVATE_KEY }}
          FIREBASE_PK: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
        run: |
          # Remove broken multi-line entries from heredoc
          sed -i '/^APPLE_PRIVATE_KEY/d' .env.production
          sed -i '/^FIREBASE_ADMIN_PRIVATE_KEY/d' .env.production
          # Remove stray PEM lines (BEGIN/END PRIVATE KEY, base64 fragments)
          sed -i '/^-----/d' .env.production
          sed -i '/^[A-Za-z0-9+/=]\{20,\}$/d' .env.production
          # Re-add as single-line with literal \n using awk (not sed — sed converts \\n to real newlines)
          APPLE_SINGLE=$(printf '%s' "$APPLE_PK" | awk '{printf "%s", (NR>1 ? "\\n" : "") $0}')
          echo "APPLE_PRIVATE_KEY=${APPLE_SINGLE}" >> .env.production
          FIREBASE_SINGLE=$(printf '%s' "$FIREBASE_PK" | awk '{printf "%s", (NR>1 ? "\\n" : "") $0}')
          echo "FIREBASE_ADMIN_PRIVATE_KEY=${FIREBASE_SINGLE}" >> .env.production

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn arn:aws:apprunner:us-east-2:885446904257:service/itwhip-website/42087a75b5b14814a8e677b63201ec13 \
            --region us-east-2
